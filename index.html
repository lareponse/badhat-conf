<main>
  <h1>BADHAT Apache Site Generator</h1>
  <p>Apache vhost generator. Environment-agnostic. No <code>SetEnv BADHAT_MODE</code>.</p>

  <form>
    <fieldset>
      <legend>Site</legend>

      <label>
        Production domain
        <input id="domain" type="text" value="liebrex.net" spellcheck="false">
      </label>

      <label>
        Staging prefix
        <input id="stagingPrefix" type="text" value="test" spellcheck="false">
      </label>

      <label>
        Dev suffix
        <input id="devSuffix" type="text" value="p-p" spellcheck="false">
      </label>

      <label class="check">
        <input id="hasWww" type="checkbox" checked>
        www alias for production
      </label>
    </fieldset>

    <fieldset>
      <legend>Paths</legend>

      <label>
        Web root
        <input id="webRoot" type="text" value="/var/www" spellcheck="false">
      </label>

      <label>
        Apache sites-available
        <input id="apacheSites" type="text" value="/etc/apache2/sites-available" spellcheck="false">
      </label>

      <label>
        Apache logs
        <input id="apacheLogs" type="text" value="/var/log/apache2" spellcheck="false">
      </label>

      <label>
        BADHAT includes
        <input id="apacheBadhat" type="text" value="/etc/apache2/badhat" spellcheck="false">
      </label>

      <label>
        Credentials includes
        <input id="apacheCreds" type="text" value="/etc/apache2/creds-available" spellcheck="false">
      </label>
    </fieldset>

    <fieldset>
      <legend>Files</legend>

      <label class="check"><input id="hasDevHttp" type="checkbox" checked> Dev HTTP</label>
      <label class="check"><input id="hasStagingHttp" type="checkbox" checked> Staging HTTP</label>
      <label class="check"><input id="hasStagingSsl" type="checkbox"> Staging HTTPS</label>
      <label class="check"><input id="hasProdSsl" type="checkbox" checked> Production HTTPS</label>
    </fieldset>

    <fieldset>
      <legend>Release</legend>

      <label>
        Git repository
        <input id="repo" type="text" value="git@github.com:amstram-creation/liebrex.net.git" spellcheck="false">
      </label>

      <label>
        Git ref
        <input id="gitRef" type="text" value="main" spellcheck="false">
      </label>

      <label>
        Release version
        <input id="version" type="text" spellcheck="false">
      </label>

      <label class="check">
        <input id="hasReleaseCommands" type="checkbox" checked>
        Release commands
      </label>
    </fieldset>
  </form>

  <div id="validation"></div>
  <section id="summary"></section>
  <section id="output"></section>
</main>

<template id="tpl-dev-http"># {{apacheSites}}/{{devHost}}.conf

<VirtualHost *:80>
    ServerName {{devHost}}

    DocumentRoot {{devRoot}}/public

    ErrorLog {{apacheLogs}}/{{domain}}-{{devSuffix}}-error.log
    CustomLog {{apacheLogs}}/{{domain}}-{{devSuffix}}-access.log combined

    php_admin_value open_basedir "{{devRoot}}/app/:{{devRoot}}/add/:{{devRoot}}/public/:/tmp/"

    Include {{apacheCreds}}/{{domain}}.conf
    Include {{apacheBadhat}}/badhat-common.conf
    Include {{apacheBadhat}}/badhat-dev.conf

    <Directory "{{devRoot}}/public">
        Include {{apacheBadhat}}/badhat-directory.conf
    </Directory>
</VirtualHost>
</template>

<template id="tpl-staging-http"># {{apacheSites}}/{{stagingHost}}.conf

<VirtualHost *:80>
    ServerName {{stagingHost}}

    DocumentRoot {{stagingRoot}}/public

    ErrorLog {{apacheLogs}}/{{domain}}-{{stagingPrefix}}-error.log
    CustomLog {{apacheLogs}}/{{domain}}-{{stagingPrefix}}-access.log combined

    php_admin_value open_basedir "{{stagingRoot}}/app/:{{stagingRoot}}/add/:{{stagingRoot}}/public/:/tmp/"

    Include {{apacheCreds}}/{{domain}}.conf
    Include {{apacheBadhat}}/badhat-common.conf
    Include {{apacheBadhat}}/badhat-staging.conf

    <Directory "{{stagingRoot}}/public">
        Include {{apacheBadhat}}/badhat-directory.conf
    </Directory>
</VirtualHost>
</template>

<template id="tpl-staging-ssl"># {{apacheSites}}/{{stagingHost}}-le-ssl.conf

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName {{stagingHost}}

    DocumentRoot {{stagingRoot}}/public

    ErrorLog {{apacheLogs}}/{{domain}}-{{stagingPrefix}}-ssl-error.log
    CustomLog {{apacheLogs}}/{{domain}}-{{stagingPrefix}}-ssl-access.log combined

    php_admin_value open_basedir "{{stagingRoot}}/app/:{{stagingRoot}}/add/:{{stagingRoot}}/public/:/tmp/"

    Include {{apacheCreds}}/{{domain}}.conf
    Include {{apacheBadhat}}/badhat-common.conf
    Include {{apacheBadhat}}/badhat-staging.conf

    <Directory "{{stagingRoot}}/public">
        Include {{apacheBadhat}}/badhat-directory.conf
    </Directory>

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/{{stagingHost}}/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/{{stagingHost}}/privkey.pem
</VirtualHost>
</IfModule>
</template>

<template id="tpl-prod-ssl"># {{apacheSites}}/{{domain}}-le-ssl.conf

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName {{domain}}
{{serverAliases}}
    DocumentRoot {{prodRoot}}/public

    ErrorLog {{apacheLogs}}/{{domain}}-prod-ssl-error.log
    CustomLog {{apacheLogs}}/{{domain}}-prod-ssl-access.log combined

    php_admin_value open_basedir "{{prodRoot}}/app/:{{prodRoot}}/add/:{{prodRoot}}/public/:/tmp/"

    Include {{apacheCreds}}/{{domain}}.conf
    Include {{apacheBadhat}}/badhat-common.conf

    <Directory "{{prodRoot}}/public">
        Include {{apacheBadhat}}/badhat-directory.conf
    </Directory>

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/{{domain}}/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/{{domain}}/privkey.pem
</VirtualHost>
</IfModule>
</template>

<template id="tpl-release">#!/usr/bin/env bash
set -euo pipefail

sudo mkdir -p "{{releaseRoot}}"
sudo git clone "{{repo}}" "{{releasePath}}"

cd "{{releasePath}}"
sudo git checkout "{{gitRef}}"

{{stagingRelease}}sudo ln -sfnT "{{releasePath}}" "{{prodRoot}}"

sudo apache2ctl configtest
sudo systemctl reload apache2

readlink -f "{{prodRoot}}"
{{stagingCheck}}curl -I "https://{{domain}}/"
</template>
